# Nginx Configuration for buildnest-website.advait.website

upstream buildnest_upstream {
    server 127.0.0.1:3012;
    keepalive 64;
}

# HTTPS Server
server {
    server_name buildnest-website.advait.website;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/schema+json
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Next.js static asset optimization
    location /_next/static/ {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files optimization
    location /public/ {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
    }

    # Next.js Application Proxy
    location / {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/buildnest-website.advait.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buildnest-website.advait.website/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP to HTTPS Redirect
server {
    if ($host = buildnest-website.advait.website) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name buildnest-website.advait.website;
    return 404;
}
