# Nginx Configuration Template for buildnest-website.advait.website
# Save this file to /etc/nginx/sites-available/buildnest-website

upstream buildnest_upstream {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name buildnest-website.advait.website;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Proxy traffic to Next.js
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name buildnest-website.advait.website;

    # SSL Certificates - Certbot will automatically configure and insert these paths:
    # ssl_certificate /etc/letsencrypt/live/buildnest-website.advait.website/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/buildnest-website.advait.website/privkey.pem;

    # Basic SSL Settings (Optional, Certbot will manage these)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/schema+json
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Next.js static asset optimization
    location /_next/static/ {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Cache aggressively
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files optimization
    location /public/ {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
    }

    # Next.js Application Proxy
    location / {
        proxy_pass http://buildnest_upstream;
        proxy_http_version 1.1;
        
        # Connection headers to support WebSocket/Next.js Dev/HMR (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
